<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 id="id1">Titulo</h1>
    <h2 id="id2">DOM Docuemnt Object Model</h2>
    <h2>API Application Programming Interface</h2>
    <p id="id3">Esto es un párrafo.</p>
    <button id="id4" onclick="escribir()">Hola</button>

    <!--Elementos de formulario-->
    <input type="text">


    <script>
        //esto es un comentario
        //no se puede definir mas de una vez la misma variable con var, pero si con let o const
        // elemento = 1
        // let elemento = "uno"
        const elemento = [1, 2, 3, 4]

        function nombre() {
            console.log("Hola mundo");
        }

        for (k in elemento)
            console.log(k);

        console.log("-------------------------");

        for (i in elemento)
            console.log(elemento[i]);

        console.log("-------------------------");

        for (i = 0; i < elemento.length; i++)
            console.log(elemento[i]);

        console.log(elemento);
        for (i = 0; i < 10; i++)
            console.log("Hola mundo");
        nombre()

        //manipulacion del DOM
        let html = document
        let html2 = html.getElementById("id1")
        console.log(html2.innerText)
        html2.innerText = "Fin de la clase"

        function escribir() {
            let entrada = document.getElementsByTagName("input")
            for (const key in entrada) {
                if (!Object.hasOwn(entrada, key)) continue;
                const element = entrada[key];
                console.log(element)
            }
            let valor_entrada = entrada[0].value
            console.log(valor_entrada)
            html2.innerText = valor_entrada
        }
    </script>
</body>

</html>
