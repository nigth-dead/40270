<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e0c;
      --surface: #1a1916;
      --border: #2e2c28;
      --accent: #c9a84c;
      --accent-dim: #a07830;
      --text: #f0ece4;
      --muted: #7a7568;
      --input-bg: #141310;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* Panel izquierdo decorativo */
    .side {
      width: 45%;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }

    .side::before {
      content: '';
      position: absolute;
      top: -120px;
      left: -120px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .side::after {
      content: '';
      position: absolute;
      bottom: -80px;
      right: -80px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border: 1.5px solid var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.5;
    }

    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .side-content {
      padding-bottom: 1rem;
    }

    .side-tag {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    .side-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2.6rem;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 1.2rem;
    }

    .side-desc {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 320px;
    }

    .stores-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .store-pill {
      font-size: 0.72rem;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .store-pill.active {
      border-color: var(--accent-dim);
      color: var(--accent);
      background: rgba(201,168,76,0.06);
    }

    /* Panel derecho - formulario */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      margin-bottom: 2.5rem;
    }

    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.9rem;
      margin-bottom: 0.4rem;
    }

    .card-sub {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 1.3rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent-dim);
    }

    input::placeholder {
      color: var(--muted);
      opacity: 0.5;
    }

    .forgot {
      display: block;
      text-align: right;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.5rem;
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot:hover { color: var(--accent); }

    .btn {
      width: 100%;
      margin-top: 1.8rem;
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: #0f0e0c;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover { background: #d4b060; }
    .btn:active { transform: scale(0.98); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.6rem 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .role-row {
      display: flex;
      gap: 10px;
    }

    .role-btn {
      flex: 1;
      padding: 10px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .role-btn:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    .footer-note {
      margin-top: 2rem;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .side { display: none; }
    }
  </style>
</head>
<body>

  <!-- Formulario -->
  <div class="main">
    <div class="card">
      <div class="card-header">
        <h1 class="card-title">Iniciar sesión</h1>
        <p class="card-sub">Ingresa tus credenciales para continuar</p>
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" placeholder="usuario@empresa.com" />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" />
        <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
      </div>

      <button class="btn">Entrar al sistema</button>

      <p class="footer-note">Al ingresar aceptas los términos de uso del sistema.<br/>Solo personal autorizado.</p>
    </div>
  </div>

</body>
</html>
